<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Cards</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 32px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
        display: grid;
        gap: 24px;
      }

      .card {
        position: relative;
        width: 320px;
        height: 200px;
        overflow: hidden;
        border-radius: 20px;
        color: #fff;
        isolation: isolate;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.28);
      }

      .card::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at top right, rgba(255, 255, 255, 0.24), transparent 32%),
          radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.18), transparent 28%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.12), transparent 46%);
        z-index: 0;
      }

      .card__sky {
        position: absolute;
        inset: 0 0 42% 0;
        background: linear-gradient(180deg, rgba(255,255,255,0.32), rgba(255,255,255,0.06));
        z-index: 0;
      }

      .card__ground {
        position: absolute;
        inset: auto 0 0 0;
        height: 40%;
        background: linear-gradient(180deg, rgba(15,23,42,0.18), rgba(15,23,42,0.34));
        z-index: 0;
      }

      .card__layer {
        position: absolute;
        inset: auto -5% 0 -5%;
        height: 54%;
        border-radius: 45% 45% 0 0;
        opacity: 0.95;
        z-index: 0;
      }

      .card__layer--back {
        bottom: 26%;
        opacity: 0.35;
      }

      .card__layer--mid {
        bottom: 16%;
        opacity: 0.52;
      }

      .card__layer--front {
        bottom: 0;
        opacity: 0.9;
      }

      .card__content {
        position: absolute;
        left: 24px;
        right: 24px;
        bottom: 22px;
        z-index: 1;
      }

      .card__eyebrow {
        display: inline-block;
        margin-bottom: 10px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 0.08em;
        background: rgba(255, 255, 255, 0.16);
        backdrop-filter: blur(8px);
      }

      .card__title {
        margin: 0;
        font-size: 38px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .card__subtitle {
        margin: 8px 0 0;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.9);
      }

      .beijing-1 {
        background: linear-gradient(135deg, #f59e0b 0%, #dc6803 48%, #9a3412 100%);
      }

      .beijing-1 .card__layer--back { background: #fcd34d; }
      .beijing-1 .card__layer--mid { background: #b45309; }
      .beijing-1 .card__layer--front { background: #7c2d12; }

      .beijing-2 {
        background: linear-gradient(135deg, #fb923c 0%, #c2410c 50%, #7c2d12 100%);
      }

      .beijing-2 .card__layer--back { background: #fdba74; }
      .beijing-2 .card__layer--mid { background: #9a3412; }
      .beijing-2 .card__layer--front { background: #6b210f; }

      .shanghai-1 {
        background: linear-gradient(135deg, #38bdf8 0%, #2563eb 45%, #1e3a8a 100%);
      }

      .shanghai-1 .card__layer--back { background: #7dd3fc; }
      .shanghai-1 .card__layer--mid { background: #1d4ed8; }
      .shanghai-1 .card__layer--front { background: #172554; }

      .shanghai-2 {
        background: linear-gradient(135deg, #60a5fa 0%, #2563eb 42%, #312e81 100%);
      }

      .shanghai-2 .card__layer--back { background: #93c5fd; }
      .shanghai-2 .card__layer--mid { background: #1e40af; }
      .shanghai-2 .card__layer--front { background: #1e1b4b; }

      .hangzhou-1 {
        background: linear-gradient(135deg, #34d399 0%, #0f766e 50%, #164e63 100%);
      }

      .hangzhou-1 .card__layer--back { background: #86efac; }
      .hangzhou-1 .card__layer--mid { background: #0f766e; }
      .hangzhou-1 .card__layer--front { background: #134e4a; }
    </style>
  </head>
  <body>
    <section class="card beijing-1" id="beijing-1">
      <div class="card__sky"></div>
      <div class="card__layer card__layer--back"></div>
      <div class="card__layer card__layer--mid"></div>
      <div class="card__ground"></div>
      <div class="card__layer card__layer--front"></div>
      <div class="card__content">
        <div class="card__eyebrow">TRAVEL FOOTPRINT</div>
        <h1 class="card__title">北京</h1>
        <p class="card__subtitle">故宫角楼</p>
      </div>
    </section>

    <section class="card beijing-2" id="beijing-2">
      <div class="card__sky"></div>
      <div class="card__layer card__layer--back"></div>
      <div class="card__layer card__layer--mid"></div>
      <div class="card__ground"></div>
      <div class="card__layer card__layer--front"></div>
      <div class="card__content">
        <div class="card__eyebrow">TRAVEL FOOTPRINT</div>
        <h1 class="card__title">北京</h1>
        <p class="card__subtitle">景山日落</p>
      </div>
    </section>

    <section class="card shanghai-1" id="shanghai-1">
      <div class="card__sky"></div>
      <div class="card__layer card__layer--back"></div>
      <div class="card__layer card__layer--mid"></div>
      <div class="card__ground"></div>
      <div class="card__layer card__layer--front"></div>
      <div class="card__content">
        <div class="card__eyebrow">CITY LIGHTS</div>
        <h1 class="card__title">上海</h1>
        <p class="card__subtitle">外滩夜景</p>
      </div>
    </section>

    <section class="card shanghai-2" id="shanghai-2">
      <div class="card__sky"></div>
      <div class="card__layer card__layer--back"></div>
      <div class="card__layer card__layer--mid"></div>
      <div class="card__ground"></div>
      <div class="card__layer card__layer--front"></div>
      <div class="card__content">
        <div class="card__eyebrow">CITY WALK</div>
        <h1 class="card__title">上海</h1>
        <p class="card__subtitle">武康路梧桐</p>
      </div>
    </section>

    <section class="card hangzhou-1" id="hangzhou-1">
      <div class="card__sky"></div>
      <div class="card__layer card__layer--back"></div>
      <div class="card__layer card__layer--mid"></div>
      <div class="card__ground"></div>
      <div class="card__layer card__layer--front"></div>
      <div class="card__content">
        <div class="card__eyebrow">MORNING LAKE</div>
        <h1 class="card__title">杭州</h1>
        <p class="card__subtitle">西湖晨雾</p>
      </div>
    </section>
  </body>
</html>
